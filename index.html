<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Site Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>⚡ AI Web Studio</h1>
        <p>Опишите свою идею, и искусственный интеллект создаст файлы сайта.</p>
    </header>

    <main class="container">
        <section class="input-section">
            <textarea id="prompt-input" placeholder="Например: Сделай современный калькулятор чаевых с выбором процента и красивой анимацией..."></textarea>
            <button id="generate-btn">Сгенерировать файлы</button>
        </section>

        <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <p>Gemini проектирует ваш сайт, подождите немного...</p>
        </div>

        <section id="result-section" class="result-section hidden">
            <div class="result-header">
                <h3>Результат генерации:</h3>
                <button id="download-all-btn" class="btn-success">📥 Скачать все файлы (.zip)</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="html">index.html</button>
                <button class="tab-btn" data-tab="css">style.css</button>
                <button class="tab-btn" data-tab="js">script.js</button>
            </div>

            <div class="tab-content active" id="tab-html">
                <div class="code-actions">
                    <button class="copy-btn" onclick="copyCode('html-code')">📋 Скопировать</button>
                </div>
                <pre><code id="html-code"></code></pre>
            </div>

            <div class="tab-content" id="tab-css">
                <div class="code-actions">
                    <button class="copy-btn" onclick="copyCode('css-code')">📋 Скопировать</button>
                </div>
                <pre><code id="css-code"></code></pre>
            </div>

            <div class="tab-content" id="tab-js">
                <div class="code-actions">
                    <button class="copy-btn" onclick="copyCode('js-code')">📋 Скопировать</button>
                </div>
                <pre><code id="js-code"></code></pre>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
